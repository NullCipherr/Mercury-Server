name: mercury-server

services:
  mercury-server:
    container_name: mercury-server
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    restart: unless-stopped
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --port-retries
      - "20"
      - --threads
      - "0"
      - --static-dir
      - ./static
      - --read-timeout-ms
      - "2000"
      - --write-timeout-ms
      - "2000"
      - --max-header-bytes
      - "16384"
      - --max-body-bytes
      - "1048576"
