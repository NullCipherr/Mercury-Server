<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mercury Server</title>
  <meta name="description" content="Landing page do Mercury Server" />
  <meta property="og:title" content="Mercury Server" />
  <meta property="og:description" content="Projeto open source em Zig" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://raw.githubusercontent.com/NullCipherr/Mercury-Server/main/docs/assets/mercury-logo.png" />
  <meta name="theme-color" content="#0b1020" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <a class="skip-link" href="#conteudo" id="skip-link"></a>

  <header>
    <div class="container nav" role="navigation" aria-label="Menu principal">
      <a class="brand" href="#topo" id="topo">
        <img id="brand-logo" src="" alt="Logo do projeto" />
        <span id="brand-name"></span>
      </a>

      <nav class="menu" aria-label="Seções da página">
        <ul id="nav-menu-list" class="menu-list"></ul>
      </nav>

      <a class="btn btn-primary" id="repo-button" href="#"></a>
    </div>
  </header>

  <main id="conteudo">
    <section class="hero">
      <div class="container hero-grid">
        <div>
          <span class="eyebrow" id="hero-eyebrow"></span>
          <h1 id="hero-title"></h1>
          <p id="hero-description"></p>

          <div class="hero-actions" id="hero-actions"></div>
          <div class="hero-meta" id="hero-meta" aria-label="Resumo técnico"></div>
        </div>

        <aside class="terminal" aria-label="Preview de execução no terminal">
          <div class="terminal-header">
            <div class="dots" aria-hidden="true">
              <span class="dot"></span>
              <span class="dot"></span>
              <span class="dot"></span>
            </div>
            <span id="terminal-path"></span>
          </div>
          <pre><code id="terminal-lines"></code></pre>
        </aside>
      </div>
    </section>

    <section id="recursos">
      <div class="container">
        <div class="section-head">
          <h2 id="features-title"></h2>
          <p id="features-description"></p>
        </div>
        <div class="features" id="features-grid"></div>
      </div>
    </section>

    <section id="metricas">
      <div class="container">
        <div class="section-head">
          <h2 id="metrics-title"></h2>
          <p id="metrics-description"></p>
        </div>
        <div class="metrics" id="metrics-grid" aria-label="Resumo de benchmark"></div>
      </div>
    </section>

    <section id="contribuicao">
      <div class="container contribute">
        <div class="section-head">
          <h2 id="contribution-title"></h2>
          <p id="contribution-description"></p>
        </div>

        <ol class="steps" id="contribution-steps"></ol>
        <div class="cta-row" id="contribution-actions"></div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container" id="footer-text"></div>
  </footer>

  <p class="status" id="status" role="status" aria-live="polite"></p>

  <noscript>
    <p class="noscript">Ative JavaScript para carregar o conteudo da landing page.</p>
  </noscript>

  <script src="assets/js/main.js" defer></script>
</body>
</html>
